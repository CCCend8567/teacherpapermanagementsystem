<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>创建教师 - 教师论文管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <h1>教师论文管理系统</h1>
                </div>
                <div class="nav-links">
                    <a href="/">首页</a>
                    <a href="/teachers">教师列表</a>
                    <a th:if="${#httpServletRequest.remoteUser == null}" th:href="@{/login}">登录</a>
                    <a th:if="${#httpServletRequest.remoteUser != null}" th:href="@{/profile}">个人中心</a>
                    <a th:if="${#httpServletRequest.remoteUser != null}" th:href="@{/logout}">退出登录</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="card">
                <h2>创建教师信息</h2>
                <form method="post" th:action="@{/teachers}" id="teacherForm">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="department">院系</label>
                        <input type="text" id="department" name="department" required>
                    </div>
                    <div class="form-group">
                        <label for="intro">个人简介</label>
                        <textarea id="intro" name="intro" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="school">学校</label>
                        <input type="text" id="school" name="school" th:value="${teacher.school}">
                    </div>
                    <button type="submit">创建</button>
                </form>
                <div class="error-message" th:if="${param.error}" th:text="${session.errorMessage}">
                    创建失败，请检查输入信息
                </div>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
