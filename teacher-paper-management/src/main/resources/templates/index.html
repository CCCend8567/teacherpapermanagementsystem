<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>教师论文管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <h1>教师个人主页论文下载管理系统</h1>
                </div>
                <div class="nav-links">
                    <a href="/">首页</a>
                    <a href="/teachers">教师列表</a>
                    <a href="#" th:if="${session.user != null}">欢迎, [[${session.user.username}]]</a>
                    <a href="#" th:if="${session.user != null}" th:href="@{/logout}">退出</a>
                    <a th:if="${#httpServletRequest.remoteUser == null}" th:href="@{/login}">登录</a>
                    <a th:if="${#httpServletRequest.remoteUser != null}" th:href="@{/profile}">个人中心</a>
                    <a th:if="${#httpServletRequest.remoteUser != null}" th:href="@{/logout}">退出登录</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2>高效管理教师论文资源</h2>
                <p>提供便捷的论文上传、下载和管理功能</p>
                <a href="#" class="btn" th:href="@{/teachers}">浏览教师论文</a>
            </div>
        </section>

        <section class="features">
            <div class="container">
                <div class="feature">
                    <h3>资源丰富</h3>
                    <p>汇集各领域优秀教师的学术论文</p>
                </div>
                <div class="feature">
                    <h3>便捷管理</h3>
                    <p>简单直观的界面，轻松上传和下载论文</p>
                </div>
                <div class="feature">
                    <h3>安全可靠</h3>
                    <p>严格的权限控制，确保资源安全</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
