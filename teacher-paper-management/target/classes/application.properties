spring.application.name=TeacherPaper
# 服务器配置
server.port=8080
server.servlet.context-path=/
server.error.path=/error

# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/teacher_paper?useUnicode=true&characterEncoding=utf8&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 文件上传配置
app.file.upload-dir=./uploads/papers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=./temp
spring.servlet.multipart.resolve-lazily=true

# JWT配置
app.jwtSecret=YourJwtSecretKey
app.jwtExpirationMs=86400000

# 日志配置
logging.level.root=INFO
logging.level.com.example.teacherpaper=DEBUG
logging.file.name=./logs/teacher-paper.log

# 静态资源配置
spring.resources.static-locations=classpath:/static/

# Thymeleaf配置
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML